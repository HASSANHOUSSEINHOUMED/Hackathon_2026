# Fichier temporaire pour tester uniquement la partie storage
# Le docker-compose.yml final sera géré par Korniti (Rôle 6)

services:

  minio:
    image: minio/minio:latest
    container_name: hackathon-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: changeme_minio
    volumes:
      - minio_data:/data

  mongo:
    image: mongo:7
    container_name: hackathon-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  storage-init:
    build: ./storage
    container_name: hackathon-storage-init
    depends_on:
      - minio
      - mongo
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: changeme_minio
      BUCKET_RAW: raw-zone
      BUCKET_CLEAN: clean-zone
      BUCKET_CURATED: curated-zone
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: hackathon2026

volumes:
  minio_data:
  mongo_data: