x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    _PIP_ADDITIONAL_REQUIREMENTS: "requests"
  volumes:
    - ./dags:/opt/airflow/dags
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - docuflow-net

services:
  # ═══════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2024-01-29T03-56-32Z
    container_name: docuflow-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuflow-net

  minio-init:
    image: minio/mc:RELEASE.2024-01-28T16-23-14Z
    container_name: docuflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/raw-zone;
        mc mb --ignore-existing local/clean-zone;
        mc mb --ignore-existing local/curated-zone;
        mc mb --ignore-existing local/pending-zone;
        mc anonymous set download local/raw-zone;
        echo 'Buckets initialisés avec succès';
        exit 0;
      "
    networks:
      - docuflow-net

  mongodb:
    image: mongo:7.0
    container_name: docuflow-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuflow-net

  postgres:
    image: postgres:15
    container_name: docuflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuflow-net

  # ═══════════════════════════════════════
  # SERVICES APPLICATIFS
  # ═══════════════════════════════════════
  ocr-service:
    build:
      context: ./services/ocr
      dockerfile: Dockerfile
    container_name: docuflow-ocr
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docuflow-net

  validation-service:
    build:
      context: ./services/validation
      dockerfile: Dockerfile
    container_name: docuflow-validation
    ports:
      - "5002:5002"
    environment:
      FLASK_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docuflow-net

  storage-api:
    build:
      context: ./storage
      dockerfile: Dockerfile.api
    container_name: docuflow-storage-api
    ports:
      - "5003:5003"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin}@mongodb:27017/docuflow?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - docuflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuflow-backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin}@mongodb:27017/docuflow?authSource=admin
      OCR_SERVICE_URL: http://ocr-service:5001
      VALIDATION_SERVICE_URL: http://validation-service:5002
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - docuflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - docuflow-net

  # ═══════════════════════════════════════
  # AIRFLOW
  # ═══════════════════════════════════════
  airflow-init:
    <<: *airflow-common
    container_name: docuflow-airflow-init
    entrypoint: >
      /bin/bash -c "
        airflow db init;
        airflow users create --username admin --password admin --firstname Admin --lastname DocuFlow --role Admin --email admin@docuflow.local;
        echo 'Airflow initialisé';
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: docuflow-airflow-web
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: docuflow-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  minio-data:
  mongo-data:
  postgres-data:

networks:
  docuflow-net:
    driver: bridge
